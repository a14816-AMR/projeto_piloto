<!DOCTYPE html>
<html lang="pt-br">
<head>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=apps" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0&icon_names=close" />
    <title>Pagina Principal</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="calculadora.css">
    <body>
        <h1 class="titulo">Calculadora</h1>
        <div class="calculadora">
            <div id="tela" class="tela">
                <button class="material-symbols-outlined">apps</button>
                <div id="telaOperacao" class="telaOperacao"></div>
                <div id="telaResultado" class="telaResultado" onclick = "resultado ('resultado')"></div>
            </div>
            <div class="calculos">
                <button id="apagar" class="adicionais" onclick="botao('apagar')">⌫</button>
                <button id="limpar" class="adicionais" onclick="botao('limpar')">C</button>
                <button id="porcento" class="adicionais" onclick="botao('porcento')">%</button>
                <button id="dividir" class="operadores" onclick="botao('dividir')">/</button>
                

                <button id="sete" class="numeros" onclick="botao('sete')">7</button>
                <button id="oito" class="numeros" onclick="botao('oito')">8</button>
                <button id="nove" class="numeros" onclick="botao('nove')">9</button>
                <button id="multiplicar" class="operadores" onclick="botao('multiplicar')">X</button>

                <button id="quatro" class="numeros" onclick="botao('quatro')">4</button>
                <button id="cinco" class="numeros" onclick="botao('cinco')">5</button>
                <button id="seis" class="numeros" onclick="botao('seis')">6</button>
                <button id="subtrair" class="operadores" onclick="botao('subtrair')">-</button>

                <button id="um" class="numeros" onclick="botao('um')">1</button>
                <button id="dois" class="numeros" onclick="botao('dois')">2</button>
                <button id="tres" class="numeros" onclick="botao('tres')">3</button>
                <button id="somar" class="operadores" onclick="botao('somar')">+</button>
                
                <button id="menu" class="numeros" onclick="botao('menu')">@</button>
                <button id="zero" class="numeros" onclick="botao('zero')">0</button>
                <button id="ponto" class="numeros" onclick="botao('ponto')">.</button>
                <button id="igual" class="operadores" onclick="botao('igual')">=</button>
                

            </div>
        </div>

        <style> 
            .titulo {
                color: #000;
                font-family: 'Arial', sans-serif;
                font-size: 30px;
                text-align: center;
            }

            .calculadora {
                background-color: rgb(36, 35, 35);
                border-color: #000000;
                border-width: 10px;
                border-style: solid;
                width: 340px;
                height: 650px;
                border-radius: 40px;
                margin: 0 auto;
                margin-top: 50px;
                box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5);
            }
                .calculos {
                    display: grid;
                    grid-template-columns: repeat(4, 1fr);
                    background-color: rgba(255, 255, 255, 0);
                    width: 340px;
                    height: 450px;
                    border-radius: 30px;
                    margin-top: 0px;
                    position: relative;
                    padding: 5px;
                }
                    .numeros {
                        justify-content: space-around;
                        font-size: 30px;
                        color: #ffffff;
                        text-align: center;
                        line-height: 2;
                        vertical-align: center;
                        width: 75px;
                        height: 75px;
                        border-radius: 100%;
                        background-color: rgba(255, 255, 255, 0.199);
                        /* Firefox */
                        -moz-transition: all 0.2s ease-in;
                        /* Webkit */
                        -webkit-transition: all  0.2s ease-in;
                        /* Opera */ 
                        -o-transition: all 0.2s ease-in;
                        /* Standard */
                        transition: all 0.2s ease-in;
                        
                    }
                    .numeros:hover {
                        background-color: rgba(255, 255, 255, 0.199);
                        box-shadow: 0px 0px 30px rgba(255, 255, 255, 0.719);
                    }
                    .operadores {
                        justify-content: space-around;
                        font-size: 30px;
                        color: #ffffff;
                        text-align: center;
                        line-height: 2;
                        vertical-align: center;
                        width: 75px;
                        height: 75px;
                        border-radius: 100%;
                        background-color: #f88808;
                        /* Firefox */
                        -moz-transition: all 0.2s ease-in;
                        /* Webkit */
                        -webkit-transition: all  0.2s ease-in;
                        /* Opera */ 
                        -o-transition: all 0.2s ease-in;
                        /* Standard */
                        transition: all 0.2s ease-in;
                    }
                    .operadores:hover {
                        background-color: #f88808;
                        box-shadow: 0px 0px 30px #ff9419;
                    }

                    .adicionais {
                        justify-content: space-around;
                        font-size: 30px;
                        color: #ffffff;
                        text-align: center;
                        line-height: 2;
                        vertical-align: center;
                        width: 75px;
                        height: 75px;
                        border-radius: 100%;
                        background-color: rgba(255, 255, 255, 0.267);
                        /* Firefox */
                        -moz-transition: all 0.2s ease-in;
                        /* Webkit */
                        -webkit-transition: all  0.2s ease-in;
                        /* Opera */ 
                        -o-transition: all 0.2s ease-in;
                        /* Standard */
                        transition: all 0.2s ease-in;
                    }
                    .adicionais:hover {
                        background-color: rgba(255, 255, 255, 0.267);
                        box-shadow: 0px 0px 30px rgba(255, 255, 255, 0.774);
                    }

                    
                .tela {
                    display: flex;
                    position: relative;
                    flex-direction: column;
                    align-items: left;
                    justify-content: center;
                    background-color: rgba(0, 0, 0, 0);
                    width: 340px;
                    height: 150px;;
                    margin-top: 20px;
                    margin-bottom: 20px;
                }

                    .material-symbols-outlined {
                        font-size: 40px;
                        background-color: #00000000;
                        color: #fffdfd;
                        margin-left: 15px;
                        padding-top: 5px;
                        display: flex;
                        justify-content: space-between;
                        width: 55px;
                        height: 65px;

                    }
                    .telaOperacao {
                        font-size: 35px;
                        text-align: right;
                        color: #ffffff81;
                        width: 300px;
                        height: 50px;
                        border-radius: 0px;
                    }
                    .telaResultado {
                        font-size: 60px;
                        color: #ffffff;
                        text-align: right;
                        width: 300px;
                        height: 50px;
                        padding-bottom: 20px;
                        border-radius: 0px;
                    }



        </style>

        <script src="./script.js">

            let expressao = "";
            
            function botao(id) {
                // Captura os elementos da tela
                const telaOperacao = document.getElementById('telaOperacao');
                const telaResultado = document.getElementById('telaResultado');

                // Mapeamento: ID do HTML -> Valor matemático
                const valores = {
                    'zero': '0', 
                    'um': '1',
                    'dois': '2',
                    'tres': '3',
                    'quatro': '4',
                    'cinco': '5',
                    'seis': '6',
                    'sete': '7',
                    'oito': '8',
                    'nove': '9',
                    'somar': '+',
                    'subtrair': '-',
                    'multiplicar': '*',
                    'dividir': '/',
                    'ponto': '.',
                    'porcento': '/100'
                };

                if (id === 'limpar') {
                    expressao = "";
                    telaOperacao.innerText = " ";
                    telaResultado.innerText = " ";
                } 
                else if (id === 'apagar') {
                    expressao = expressao.slice(0, -1);
                    telaOperacao.innerText = expressao || "0";
                } 
                else if (id === 'igual') {
                    try {
                        // eval() calcula a string. Ex: "2+2" vira 4
                        let resultado = eval(expressao);
                        telaResultado.innerText = resultado;
                    } catch (e) {
                        telaResultado.innerText = " ";
                    }
                } 
                else if (valores[id]) {
                    // Se o ID clicado existir no mapa 'valores', adiciona à conta
                    expressao += valores[id];
                    telaOperacao.innerText = expressao;
                }
            }


        </script>

    </body>
</head>

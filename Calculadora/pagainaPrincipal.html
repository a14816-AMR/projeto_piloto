<!DOCTYPE html>
<html lang="pt-br">
<head>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=apps" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0&icon_names=close" />
    <title>Pagina Principal</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="calculadora.css">
    <body>
        <h1 class="titulo">Calculadora</h1>
        <div class="calculadora">
            <div id="tela" class="tela">
                <button class="material-symbols-outlined">apps</button>
                <div id="telaOperacao" class="telaOperacao"></div>
                <div id="telaResultado" class="telaResultado" onclick = "resultado ('resultado')"></div>
            </div>
            <div class="calculos">
                <button id="apagar" class="adicionais" onclick="botao('apagar')">⌫</button>
                <button id="limpar" class="adicionais" onclick="botao('limpar')">C</button>
                <button id="porcento" class="adicionais" onclick="botao('porcento')">%</button>
                <button id="dividir" class="operadores" onclick="botao('dividir')">/</button>
                

                <button id="sete" class="numeros" onclick="botao('sete')">7</button>
                <button id="oito" class="numeros" onclick="botao('oito')">8</button>
                <button id="nove" class="numeros" onclick="botao('nove')">9</button>
                <button id="multiplicar" class="operadores" onclick="botao('multiplicar')">X</button>

                <button id="quatro" class="numeros" onclick="botao('quatro')">4</button>
                <button id="cinco" class="numeros" onclick="botao('cinco')">5</button>
                <button id="seis" class="numeros" onclick="botao('seis')">6</button>
                <button id="subtrair" class="operadores" onclick="botao('subtrair')">-</button>

                <button id="um" class="numeros" onclick="botao('um')">1</button>
                <button id="dois" class="numeros" onclick="botao('dois')">2</button>
                <button id="tres" class="numeros" onclick="botao('tres')">3</button>
                <button id="somar" class="operadores" onclick="botao('somar')">+</button>
                
                <button id="menu" class="numeros" onclick="botao('menu')">@</button>
                <button id="zero" class="numeros" onclick="botao('zero')">0</button>
                <button id="ponto" class="numeros" onclick="botao('ponto')">.</button>
                <button id="igual" class="operadores" onclick="botao('igual')">=</button>
                

            </div>
        </div>
        <script src="./script.js"></script>

    </body>
</head>
